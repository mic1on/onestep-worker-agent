name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish the package to PyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Test and build distributions
    runs-on: ubuntu-latest
    outputs:
      publish_pypi: ${{ steps.resolve.outputs.publish_pypi }}

    steps:
      - name: Resolve publish target
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PUBLISH_PYPI: ${{ github.event.inputs.publish_pypi || 'false' }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "publish_pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_pypi=$INPUT_PUBLISH_PYPI" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install test dependencies
        run: uv sync --frozen --extra test

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Smoke-install wheel
        run: |
          uv venv .release-smoke
          uv pip install --python .release-smoke/bin/python dist/*.whl
          .release-smoke/bin/onestep-agent --help

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.publish_pypi == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
